services:

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEVUSER: devuser
    depends_on:
      - broker
    networks:
      - agent_network
    volumes:
      - ..:/workspaces/agent
      - build_volume:/workspaces/agent/build
      - C:/Users/ryanp/.ssh:/home/${DEVUSER}/.ssh
      - C:/Users/ryanp/certs:/workspaces/certs
    command: ["sleep", "infinity"]

  broker:
    image: mathemaphysics/rabbitmq:3-management-ssl
    ports:
      - "15672:15672"
      - "15671:15671"
    volumes:
      - C:/Users/ryanp/certs:/etc/rabbitmq/certs
    networks:
      - agent_network
    entrypoint: /usr/local/bin/docker-entrypoint.sh
    command: rabbitmq-server

networks:
  agent_network:

volumes:
  build_volume:
